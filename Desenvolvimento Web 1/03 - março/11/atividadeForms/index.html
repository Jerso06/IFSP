<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Forms Atividade</title>
</head>

<body>

    <div id="container">
        <h1>Sua opinião</h1>
        <form action="#" method="post">
            <section>
                <label for="nome">Nome Completo</label>
                <input type="text" name="nome" id="nome" placeholder="Digite seu nome">
            </section>

            <section>
                <label for="email">E-mail</label>
                <input type="email" name="email" id="email" placeholder="email@exemplo.com">
            </section>

            <section>
                <label for="satisfacao">Nível Satisfação</label>
                <div id="radios">
                    <input type="radio" name="nivel" value="pessimo" checked><label class="item">Péssimo</label> 
                    <input type="radio" name="nivel" value="razoavel"><label class="item">Razoável</label>
                    <input type="radio" name="nivel" value="bom"><label class="item">Bom</label>
                    <input type="radio" name="nivel" value="otimo"><label class="item">Ótimo</label>
                    <input type="radio" name="nivel" value="maravilhoso"><label class="item">Maravilhoso</label>
                </div>
            </section>

            <section>
                <label for="categoria">Categoria</label>
                <select name="categoria" id="categoria">
                    <option value="sugestao">Sugestão</option>
                    <option value="elogio">Elogio</option>
                    <option value="reclamacao">Reclamação</option>
                </select>
            </section>

            <section>
                <label for="mensagem">Mensagem</label>
                <textarea name="mensagem" id="mensagem"></textarea>
            </section>

            <div>
                <input type="checkbox" name="termos" id="termos" required>Aceitar Termos de Privacidade.
            </div>

            <input type="submit" value="Enviar Agora">

        </form>
    </div>

</body>

</html>
