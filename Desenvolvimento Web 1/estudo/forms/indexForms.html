<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Treino Formulário</title>

    <style>
        #data_nasc {
            display: flex;
            justify-content: space-between;
        }

        body {
            background-color: aqua;

            font-family: Arial, Helvetica, sans-serif;
        }

        form {
            margin: auto;
            height: 63vh;
            padding: 2%;
            width: 50%;
            background-color: white;


            display: flex;
            flex-direction: column;

            border-radius: 8px;
            box-shadow: 2px 3px 5px #000000,
                -1px -1px 10px black;
        }

        legend {
            font: normal bold 1.3rem Arial, sans-serif;
        }

        fieldset {
            border: none;
        }

        hr {
            border-color: black;
        }

        h1 {
            margin-bottom: 5vh;
            color: blueviolet;
        }

        input[type='text'],
        input[type='email'] {
            height: 5vh;
            border: 1px solid #ccc;
            border-radius: 8px;
            padding-left: 2%;
            font: normal 1rem black Arial, sans-serif;
        }

        input[type='text']:focus,
        input[type='email']:focus,
        select:focus {
            border: 1px solid blue;
            outline: none;
        }

        select {
            width: 30%;
            height: 5vh;
            border: 1px solid #ccc;
            border-radius: 10px;
        }

        select:invalid {
            color: #888;
            /* cor do placeholder */
            font-style: italic;
            /* exemplo: deixar itálico */
        }

        

        button {
            border: 1px solid;
            border-radius: 6px;

            height: 5vh;
            width: 30%;
            background-color: blueviolet;
            align-self: center;

            font: normal bold 1.1rem Arial, sans-serif;
            color: white;
        }

        button:hover {
            cursor: pointer;
            background-color: rgb(114, 44, 180);
        }

        .divisor {
            margin: 2% 0 3% 0;
            display: flex;
            flex-direction: column;
            justify-content: space-between;

            font-size: 1.1rem;
        }
    </style>
</head>

<body>
    <form action="">
        <h1>Formulário de Cadastro</h1>
        <fieldset>
            <legend>Dados Pessoais</legend>
            <hr>
            <div class="divisor">
                <label for="nome">Nome:</label>
                <input type="text" name="nome" id="nome">
            </div>

            <div class="divisor">
                <label for="email">Email:</label>
                <input type="email" name="email" id="email">
            </div>

            <div class="divisor">
                <label for="cpf">CPF:</label>
                <input type="text" name="cpf" id="cpf">
            </div>

            <div class="divisor">
                <label for="data_nasc">Data de Nascimento:</label>
                <div id="data_nasc">
                    <select name="dia" id="dia" required>
                        <option value="" disabled selected hidden>Dia</option>
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                        <option value="5">5</option>
                        <option value="6">6</option>
                        <option value="7">7</option>
                        <option value="8">8</option>
                        <option value="9">9</option>
                        <option value="10">10</option>
                        <option value="11">11</option>
                        <option value="12">12</option>
                        <option value="13">13</option>
                        <option value="14">14</option>
                        <option value="15">15</option>
                        <option value="16">16</option>
                        <option value="17">17</option>
                        <option value="18">18</option>
                        <option value="19">19</option>
                        <option value="20">20</option>
                        <option value="21">21</option>
                        <option value="22">22</option>
                        <option value="23">23</option>
                        <option value="24">24</option>
                        <option value="25">25</option>
                        <option value="26">26</option>
                        <option value="27">27</option>
                        <option value="28">28</option>
                        <option value="29">29</option>
                        <option value="30">30</option>
                        <option value="31">31</option>
                    </select>

                    <select name="mes" id="mes" required>
                        <option value="" disabled selected hidden>Mês</option>
                        <option value="janeiro">Janeiro</option>
                        <option value="fevereiro">Fevereiro</option>
                        <option value="marco">Março</option>
                        <option value="abril">Abril</option>
                        <option value="maio">Maio</option>
                        <option value="junho">Junho</option>
                        <option value="julho">Julho</option>
                        <option value="agosto">Agosto</option>
                        <option value="setembro">Setembro</option>
                        <option value="outubro">Outubro</option>
                        <option value="novembro">Novembro</option>
                        <option value="dezembro">Dezembro</option>
                    </select>

                    <select name="ano" id="ano" required>
                        <option value="" disabled selected hidden>Ano</option>
                        <option value="2000">2000</option>
                        <option value="2001">2001</option>
                        <option value="2002">2002</option>
                        <option value="2003">2003</option>
                        <option value="2004">2004</option>
                        <option value="2005">2005</option>
                        <option value="2006">2006</option>
                        <option value="2007">2007</option>
                        <option value="2008">2008</option>
                        <option value="2009">2009</option>
                        <option value="2010">2010</option>
                        <option value="2011">2011</option>
                        <option value="2012">2012</option>
                        <option value="2013">2013</option>
                        <option value="2014">2014</option>
                        <option value="2015">2015</option>
                        <option value="2016">2016</option>
                        <option value="2017">2017</option>
                        <option value="2018">2018</option>
                        <option value="2019">2019</option>
                        <option value="2020">2020</option>
                        <option value="2021">2021</option>
                        <option value="2022">2022</option>
                        <option value="2023">2023</option>
                        <option value="2024">2024</option>
                        <option value="2025">2025</option>
                        <option value="2026">2026</option>
                    </select>
                </div>
            </div>

        </fieldset>


        <button type="button">Cadastre-se</button>
    </form>
</body>

</html>
