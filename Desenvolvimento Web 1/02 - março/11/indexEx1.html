<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>

    <style>
        .centralizaDados {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #buttons{
            display: flex;
            gap: 1%;
        }
    </style>
</head>

<body>

    <form>
        <label for="nome">Nome: </label>
        <input type="text" name="nome">

        <br><br>

        <div class="centralizaDados">
            <div>
                <label for="sex">Sexo: </label>
            </div>
            <div>
                <input type="radio" name="sex" value="masculino">Masculino <br>
                <input type="radio" name="sex" value="feminino">Feminino

            </div>
        </div>


        <br>

        <label for="profissao">Profissão: </label>
        <select name="profissao">
            <option value="estudante">Estudante</option>
            <option value="engenheiro">Engenheiro</option>
            <option value="desempregado">Desempregado</option>
        </select>

        <br><br>

        <div class="centralizaDados">
            <label for="comentario">Comentários: </label>
            <div>
                <textarea name="comentario" rows="5" cols="50" placeholder="Digite aqui seus comentários"></textarea>
            </div>
        </div>



        <br>

        <div id="buttons">
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </div>

    </form>
</body>

</html>
