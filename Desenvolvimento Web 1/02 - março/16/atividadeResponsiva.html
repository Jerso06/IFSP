<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Formulário Responsivo</title>
</head>

<body>

    <div id="forma">
        <h1>Finalizar Compra</h1>

        <form action="">
            <fieldset id="identificacao">
                <legend>Identificação</legend>
                <div class="divisor">
                    <label>Nome Completo</label>
                    <input type="text" id="nome" name="nome">
                </div>
                <div class="divisor">
                    <label>Email</label>
                    <input type="text" id="email" name="email">
                </div>
            </fieldset>

            <fieldset id="entrega">
                <legend>Entrega</legend>
                <div class="divisor">
                    <label>Endereço</label>
                    <input type="text" id="endereco" name="endereco">
                </div>
                <div class="divisor">
                    <label>Cidade</label>
                    <input type="text" id="cidade" name="cidade">
                </div>
                <div class="divisor" id="estadoDiv">
                    <label>Estado</label>
                    <select name="estado" id="estado">
                        <option value="es">Espirito Santo</option>
                        <option value="mg">Minas Gerais</option>
                        <option value="rj">Rio de Janeiro</option>
                        <option value="sp">São Paulo</option>
                    </select>
                </div>
            </fieldset>

            <fieldset id="pagamento">
                <legend>Pagamento</legend>
                <div id="radios">
                    <label><input type="radio" name="pagamento" value="cartao">Cartão de Crédito</label>
                    <label><input type="radio" name="pagamento" value="pix">Pix</label>
                </div>
                <div class="divisor" id="cvvDiv">
                    <label>CVV (Segurança)</label>
                    <input type="number" name="cvv" id="cvv" min="100" max="999">
                </div>
            </fieldset>

            <div id="botao">
                <input type="submit" value="Confirmar Pedido">
            </div>
        </form>
    </div>
</body>

</html>
