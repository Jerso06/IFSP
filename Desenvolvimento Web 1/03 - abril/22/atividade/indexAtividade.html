<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Atividade CEP</title>
</head>
<body>
    <form id="meuForm">
      <h2>Local Por CEP</h2>

      <div class="form-group">
          <label for="cep">CEP</label>
          <input type="text" id="cep"/>
      </div>

      <div class="form-group">
          <label for="logradouro">Logradouro</label>
          <input type="text" id="logradouro" disabled/>
      </div>

      <div class="form-group">
          <label for="bairro">Bairro</label>
          <input type="text" id="bairro" disabled/>
      </div>

      <div class="form-group">
          <label for="complemento">Complemento</label>
          <input type="text" id="complemento" disabled/>
      </div>

      <div class="form-group">
          <label for="localidade">Localidade</label>
          <input type="text" id="localidade" disabled/>
      </div>

      <div class="form-group">
          <label for="uf">UF</label>
          <input type="text" id="uf" disabled/>
      </div>

      <button type="button" onclick="buscarDados()">Buscar Dados</button>
    </form>

    <script src="script.js"></script>
</body>
</html>
