<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css">
    <title>Formulário de Cadastro</title>
    <script>
     const getCountries = () => {
          // Use esta URL no lugar da anterior
          let url = "https://servicodados.ibge.gov.br/api/v1/localidades/paises";

          // O JSON desta API é um pouco diferente, então o loop muda para:
          fetch(url)
          .then(res => res.json())
          .then(res => {
               let dados = res; 
               let html = '<option value="">Selecione um País</option>';
               dados.forEach(pais => {
                    html += `<option value="${pais.nome}">${pais.nome}</option>`;
               });
               document.getElementById("pais").innerHTML = html;
     })};

      const getStates = () => {
        let url = "https://servicodados.ibge.gov.br/api/v1/localidades/estados?orderBy=nome";
        let html = '<option value="">Selecione o Estado</option>';
        fetch(url)
          .then((response) => response.json())
          .then((json) => {
            for (let i = 0; i < json.length; i++) {
              html += `<option value="${json[i].sigla}">${json[i].nome}</option>`;
            }
            document.getElementById("state").innerHTML = html;
          });
      };

      const getCities = () => {
        let state = document.getElementById("state").value;
        if(!state) return;
        let url = `https://servicodados.ibge.gov.br/api/v1/localidades/estados/${state}/municipios?orderBy=nome`;
        let html = '<option value="">Selecione a Cidade</option>';
        fetch(url)
          .then((response) => response.json())
          .then((json) => {
            for (let i = 0; i < json.length; i++) {
              html += `<option value="${json[i].nome}">${json[i].nome}</option>`;
            }
            document.getElementById("city").innerHTML = html;
          });
      };
    </script>
</head>

<body onload="getCountries()">
    <form id="meuForm">
      <h2>Cadastro de Usuário</h2>

      <div class="form-group">
          <label for="nome">Nome Completo</label>
          <input type="text" id="nome" placeholder="Ex: Bianca Pedrosa" />
      </div>

      <div class="form-group">
          <label for="dataNasc">Data de Nascimento</label>
          <input type="date" id="dataNasc" />
          <p id="message"></p>
      </div>

      <div class="form-group">
          <label for="pais">País</label>
          <select name="pais" id="pais" onchange="getStates()">
          </select>
      </div>

      <div class="row">
          <div class="form-group">
              <label for="state">Estado (UF)</label>
              <select name="state" id="state" onchange="getCities();"></select>
          </div>
          <div class="form-group">
              <label for="city">Cidade</label>
              <select name="city" id="city">
                  <option value="">Selecione o estado</option>
              </select>
          </div>
      </div>

      <div class="row">
          <div class="form-group">
              <label for="bairro">Bairro</label>
              <input type="text" id="bairro" placeholder="Bairro" />
          </div>
          <div class="form-group">
              <label for="rua">Rua</label>
              <input type="text" id="rua" placeholder="Logradouro" />
          </div>
      </div>

      <button type="button">Finalizar Cadastro</button>
    </form>
</body>
</html>
