    <div id="formato">
        <h1>Sorteador de Números</h1>

        <form action="">
            <label>Quantidade de Números sorteados:</label>

            <label>Entre:</label>

            <label>Até:</label>

            <button type="button" onclick="sortear()">Sortear</button>
        </form>

        <h1 id="sorteio">Números Sorteados:</h1>
        <div id="numsSorteados"></div>
        <div id="alerta"></div>
    </div>

    <script src="script.js"></script>
